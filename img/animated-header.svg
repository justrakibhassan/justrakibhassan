<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
    <defs>
        <style>
            .name {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                font-size: 72px;
                font-weight: 800;
                fill: #ffffff;
                text-anchor: middle;
                dominant-baseline: middle;
                letter-spacing: -2px;
                opacity: 0;
                animation: fadeInDown 1s ease-out forwards;
            }

            .dot {
                fill: #8b5cf6;
            }

            .title {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                font-size: 20px;
                font-weight: 500;
                fill: #9ca3af;
                text-anchor: middle;
                dominant-baseline: middle;
                letter-spacing: 2px;
                opacity: 0;
                animation: fadeInUp 1s ease-out 0.4s forwards;
            }
            
            .accent {
                fill: #8b5cf6;
            }

            @keyframes fadeInDown {
                from { opacity: 0; transform: translateY(-15px); }
                to { opacity: 1; transform: translateY(0); }
            }

            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(15px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </defs>

    <!-- Dark Background -->
    <rect width="100%" height="100%" fill="#080808" rx="12" />

    <!-- Main Content -->
    <g transform="translate(0, 0)">
        <!-- Name -->
        <text x="400" y="110" class="name">
            Rakib Hassan<tspan class="dot">.</tspan>
        </text>
        
        <!-- Title -->
        <text x="400" y="170" class="title">
            Full-Stack Developer <tspan class="accent">|</tspan> Software Engineer
        </text>
    </g>
</svg>
